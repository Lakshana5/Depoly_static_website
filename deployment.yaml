apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lakshu-website
  template:
    metadata:
      labels:
        app: lakshu-website
    spec:
      containers:
      - name: nginx-website
        image: lakshana-web:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: web-ser
spec:
  selector:
    app: lakshu-website
  ports:
  - port: 80
    targetPort: 80
  type: NodePort